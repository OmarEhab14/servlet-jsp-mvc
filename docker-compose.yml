services:
  adv_db:
    image: mysql:oraclelinux9
    container_name: adv_db_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: adv_db
    volumes:
      - adv_db_data:/var/lib/mysql
    networks:
      - adv_network
    ports:
      - "3307:3306"
    restart: "unless-stopped"

  redis:
    image: redis:7-alpine
    container_name: adv_redis
    networks:
      adv_network:
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

networks:
  adv_network:
    driver: bridge

volumes:
  adv_db_data:
  redis_data: